<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Atlas AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Raleway:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c8a84b;
    --gold-light: #ffe89a;
    --gold-dim: #6b4f10;
    --bg: #080808;
    --bg2: #111;
    --bg3: #1a1a1a;
    --text: #e8e8e8;
    --text-dim: #888;
    --border: #2a2a2a;
    --user-bubble: #1c1a14;
    --ai-bubble: #0f0f0f;
  }

  html, body {
    height: 100%;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Raleway', sans-serif;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 44px;
    border: 1.5px solid #1e1e1e;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 40px 120px rgba(0,0,0,0.95), 0 0 0 1px #000;
  }

  /* ─── STARS ─── */
  .stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite var(--dl);
    opacity: 0;
  }
  @keyframes twinkle {
    0%,100%{opacity:0} 50%{opacity:var(--p)}
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px 12px;
    z-index: 10;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid #2a2a2a;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #888;
    transition: border-color .2s, background .2s;
  }
  .icon-btn:hover { border-color: #444; background: #111; }

  .plus-btn {
    border: 1.5px solid var(--gold);
    border-radius: 22px;
    padding: 7px 18px;
    color: var(--gold);
    font-size: 12px;
    font-family: 'Raleway', sans-serif;
    font-weight: 600;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    letter-spacing: .06em;
    transition: background .2s;
  }
  .plus-btn:hover { background: rgba(200,168,75,.08); }

  /* ─── SCREENS ─── */
  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; z-index: 5; }
  .screen.active { display: flex; }

  /* HOME */
  .home-center {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .orb-wrap {
    display: flex; flex-direction: column; align-items: center;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)}
  }
  .orb-glow {
    position: absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,168,75,.22) 0%, transparent 70%);
    animation: pulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.2);opacity:1}
  }

  /* CHAT SCREEN */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 2px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  .msg { display: flex; flex-direction: column; max-width: 82%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 13.5px;
    line-height: 1.55;
    letter-spacing: .01em;
  }
  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid #2a2410;
    color: #e8dfc8;
    border-bottom-right-radius: 4px;
  }
  .msg.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: #444;
    margin-top: 3px;
    padding: 0 4px;
  }

  .ai-name {
    font-size: 11px;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: .08em;
    margin-bottom: 4px;
    padding-left: 4px;
    text-transform: uppercase;
  }

  /* Typing indicator */
  .typing { display: flex; gap: 5px; align-items: center; padding: 12px 14px; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce {
    0%,80%,100%{transform:scale(0.7);opacity:.4}
    40%{transform:scale(1);opacity:1}
  }

  /* ─── ACTIONS ─── */
  .actions {
    padding: 0 20px 6px;
    flex-shrink: 0;
  }
  .action-row {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 0;
    border-bottom: 1px solid #161616;
    cursor: pointer;
    transition: opacity .15s;
  }
  .action-row:last-child { border-bottom: none; }
  .action-row:hover { opacity: .65; }
  .action-label { color: #bbb; font-size: 14px; letter-spacing: .01em; }

  /* ─── INPUT BAR ─── */
  .input-area {
    padding: 8px 16px 10px;
    flex-shrink: 0;
  }
  .input-bar {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 30px;
    display: flex; align-items: center;
    padding: 8px 10px 8px 16px;
    gap: 10px;
    transition: border-color .2s;
  }
  .input-bar:focus-within { border-color: #3a3020; }

  .attach-btn {
    color: #555; font-size: 22px; cursor: pointer; flex-shrink: 0;
    line-height: 1; background: none; border: none;
    transition: color .2s;
  }
  .attach-btn:hover { color: var(--gold); }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'Raleway', sans-serif;
    resize: none;
    max-height: 80px;
    line-height: 1.4;
  }
  #msg-input::placeholder { color: #444; }

  .send-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--gold);
    border: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .15s;
  }
  .send-btn:hover { background: var(--gold-light); }
  .send-btn:active { transform: scale(.92); }
  .send-btn:disabled { background: #2a2410; cursor: default; }

  .home-bar {
    width: 100px; height: 4px;
    background: #222; border-radius: 2px;
    margin: 6px auto 10px;
  }

  /* Error toast */
  .toast {
    position: absolute;
    bottom: 110px; left: 50%;
    transform: translateX(-50%);
    background: #3a1010;
    border: 1px solid #6b1e1e;
    color: #f08080;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 12px;
    white-space: nowrap;
    z-index: 100;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Model badge */
  .model-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; color: #555;
    letter-spacing: .06em; text-transform: uppercase;
    margin-bottom: 4px; padding-left: 4px;
  }
  .model-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }

  /* Sidebar panel */
  .sidebar {
    position: absolute;
    top: 0; left: 0;
    width: 75%; height: 100%;
    background: #0d0d0d;
    border-right: 1px solid #1e1e1e;
    z-index: 50;
    transform: translateX(-100%);
    transition: transform .3s ease;
    display: flex; flex-direction: column;
    padding: 60px 20px 30px;
    border-radius: 44px 0 0 44px;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 49;
    display: none;
  }
  .sidebar-overlay.open { display: block; }

  .sidebar h2 {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--gold);
    margin-bottom: 24px;
    letter-spacing: .1em;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #1a1a1a;
    color: #aaa; font-size: 13px; cursor: pointer;
    transition: color .15s;
  }
  .sidebar-item:hover { color: var(--gold); }

  .model-select-wrap {
    margin-top: auto;
    border-top: 1px solid #1a1a1a;
    padding-top: 20px;
  }
  .model-select-wrap label { font-size: 11px; color: #555; letter-spacing: .06em; text-transform: uppercase; display: block; margin-bottom: 8px; }
  .model-select-wrap select {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 10px;
    outline: none;
    cursor: pointer;
  }
</style>
</head>

  s.className = 'star';
  const size = Math.random() * 1.8 + 0.4;
  s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*70}%;--d:${3+Math.random()*5}s;--dl:-${Math.random()*5}s;--p:${.15+Math.random()*.5}`;
  starsEl.appendChild(s);
}

// ─── Sidebar ───
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ─── Screen switch ───
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function newChat() {
  messages = [{ role: 'system', content: 'أنت Atlas، مساعد ذكاء اصطناعي متقدم. أجب باللغة التي يستخدمها المستخدم. كن مفيدًا، دقيقًا وموجزًا.' }];
  document.getElementById('chat-messages').innerHTML = '';
  showScreen('home');
  closeSidebar();
}

// ─── Toast ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ─── Input helpers ───
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

function handleKey(e, src) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    src === 'home' ? sendFromHome() : sendMessage();
  }
}

function quickPrompt(text) {
  showScreen('chat');
  const inp = document.getElementById('msg-input');
  inp.value = text;
  autoResize(inp);
  inp.focus();
}

function sendFromHome() {
  const inp = document.getElementById('msg-input-home');
  const val = inp.value.trim();
  if (!val) return;
  inp.value = '';
  inp.style.height = 'auto';
  showScreen('chat');
  sendMessageWithText(val);
}

function sendMessage() {
  const inp = document.getElementById('msg-input');
  const val = inp.value.trim();
  if (!val || isLoading) return;
  inp.value = '';
  inp.style.height = 'auto';
  sendMessageWithText(val);
}

// ─── Core chat logic ───
function getTime() {
  return new Date().toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
}

function appendMsg(role, text) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (role === 'ai') {
    const name = document.createElement('div');
    name.className = 'ai-name';
    name.textContent = 'ATLAS';
    div.appendChild(name);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(bubble);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = getTime();
  div.appendChild(time);

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return bubble;
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  const name = document.createElement('div');
  name.className = 'ai-name';
  name.textContent = 'ATLAS';
  div.appendChild(name);
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessageWithText(text) {
  if (isLoading) return;
  isLoading = true;

  const sendBtn = document.getElementById('send-btn');
  if (sendBtn) sendBtn.disabled = true;

  appendMsg('user', text);
  messages.push({ role: 'user', content: text });

  showTyping();

  const model = document.getElementById('model-select').value;

  try {
    const res = await fetch(GROQ_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model,
        messages,
        max_tokens: 1024,
        temperature: 0.75,
        stream: false
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '...';

    hideTyping();
    messages.push({ role: 'assistant', content: reply });
    appendMsg('ai', reply);

  } catch (err) {
    hideTyping();
    showToast('⚠ ' + (err.message || 'خطأ في الاتصال'));
    appendMsg('ai', 'حدث خطأ أثناء الاتصال. يرجى المحاولة مرة أخرى.');
  } finally {
    isLoading = false;
    if (sendBtn) sendBtn.disabled = false;
  }
}
</script>
</body>
</html>
